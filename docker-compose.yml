version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scanvault
      POSTGRES_USER: scanvault
      POSTGRES_PASSWORD: scanvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanvault -d scanvault"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── ScanVault API ───────────────────────────────────────────────────────────
  # Goose migrations run automatically at startup before the server begins.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://scanvault:scanvault@postgres:5432/scanvault?sslmode=disable
      SERVER_PORT: "8080"
      LOG_LEVEL: info
      # Log output format: json (structured) | console (human-readable)
      LOG_FORMAT: json
      # HTTP server timeouts
      HTTP_READ_TIMEOUT: "15s"
      HTTP_WRITE_TIMEOUT: "15s"
      HTTP_IDLE_TIMEOUT: "60s"
      # pgx pool tuning (these are the defaults - override as needed)
      DB_MAX_CONNS: "25"
      DB_MIN_CONNS: "2"
      DB_MAX_CONN_LIFETIME: "30m"
      DB_MAX_CONN_IDLE_TIME: "5m"
      DB_HEALTH_CHECK_PERIOD: "1m"
      # Cleanup worker (disabled by default - uncomment to enable)
      CLEANUP_INTERVAL: "1h"
      CLEANUP_MAX_AGE: "0"          # e.g. "168h" to delete scans older than 1 week
      CLEANUP_KEEP_PER_IMAGE: "0"   # e.g. "10" to keep only 10 scans per image
    restart: unless-stopped

volumes:
  postgres_data:
